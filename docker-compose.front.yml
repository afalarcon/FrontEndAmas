services:
  amas-front:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: amas-front
    environment:
      AMAS_API_BASE_URL: ${AMAS_API_BASE_URL:-https://api.amaslohaceposible.cloud/api/v1}
    ports:
      - "4200:80"
    networks:
      - traefik_proxy
    restart: unless-stopped

networks:
  traefik_proxy:
    external: true
