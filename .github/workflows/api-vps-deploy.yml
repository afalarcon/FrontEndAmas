name: Deploy API to VPS

on:
  push:
    branches:
      - staging
    paths:
      - 'api/**'
      - '.github/workflows/api-vps-deploy.yml'
  workflow_dispatch:

concurrency:
  group: amas-api-vps
  cancel-in-progress: true

jobs:
  build:
    name: Build API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        working-directory: api
        run: dotnet restore Amas.slnx

      - name: Build
        working-directory: api
        run: dotnet build Amas.Api/Amas.Api.csproj -c Release --no-restore

  deploy:
    name: Deploy API
    runs-on: ubuntu-latest
    needs: build
    environment: production

    env:
      VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
      VPS_API_DIR: ${{ vars.VPS_API_DIR || '/opt/amas-api' }}
      RUN_API_MIGRATIONS: ${{ vars.RUN_API_MIGRATIONS || 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/amas_vps
          chmod 600 ~/.ssh/amas_vps
          ssh-keyscan -p "$VPS_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Prepare remote directory
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/amas_vps -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            "mkdir -p '$VPS_API_DIR' && docker network inspect amas_net >/dev/null 2>&1 || docker network create amas_net"
          ssh -i ~/.ssh/amas_vps -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            "docker network inspect traefik_proxy >/dev/null 2>&1 || docker network create traefik_proxy"

      - name: Upload API files
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          set -euo pipefail
          rsync -az --delete \
            --exclude '.env' \
            --exclude 'storage/' \
            --exclude '**/bin/' \
            --exclude '**/obj/' \
            -e "ssh -i ~/.ssh/amas_vps -p $VPS_PORT" \
            api/ "$VPS_USER@$VPS_HOST:$VPS_API_DIR/"

      - name: Upload production env
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          API_ENV_FILE: ${{ secrets.API_ENV_FILE }}
        run: |
          set -euo pipefail
          if [ -z "$API_ENV_FILE" ]; then
            echo "API_ENV_FILE secret is required."
            exit 1
          fi

          printf '%s\n' "$API_ENV_FILE" | ssh -i ~/.ssh/amas_vps -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            "cat > '$VPS_API_DIR/.env' && chmod 600 '$VPS_API_DIR/.env'"

      - name: Apply migrations
        if: env.RUN_API_MIGRATIONS != 'false'
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/amas_vps -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" "cd '$VPS_API_DIR' && docker run --rm \
            --network amas_net \
            --env-file .env \
            -v \"\$PWD:/src\" \
            -w /src \
            mcr.microsoft.com/dotnet/sdk:10.0 \
            bash -lc 'dotnet restore Amas.slnx && dotnet tool install --global dotnet-ef --version 10.0.4 && export PATH=\"\$PATH:/root/.dotnet/tools\" && dotnet ef database update --project Amas.Infrastructure --startup-project Amas.Api --no-restore'"

      - name: Deploy container
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/amas_vps -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" "cd '$VPS_API_DIR' && \
            docker compose up -d --build --remove-orphans && \
            docker image prune -f && \
            curl -fsS http://localhost:8080/health"
